<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMADA PRO - Wolf Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #tvContainer {
            position: relative;
            width: 1250px;
            height: 850px;
            background: linear-gradient(145deg, #1a1a1a 0%, #0d0d0d 50%, #1a1a1a 100%);
            border-radius: 40px;
            padding: 35px;
            box-shadow: 
                0 0 100px rgba(0,0,0,0.95),
                inset 0 0 60px rgba(0,0,0,0.8),
                0 0 30px rgba(233, 69, 96, 0.2),
                0 0 60px rgba(233, 69, 96, 0.1),
                inset 0 2px 5px rgba(255,255,255,0.05);
            border: 3px solid #2a2a2a;
        }

        #tvContainer::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 40px;
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(0,0,0,0.03) 2px,
                    rgba(0,0,0,0.03) 4px
                );
            pointer-events: none;
            z-index: 1;
        }

        #tvFrame {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
            border-radius: 50% 50% 48% 48% / 8% 8% 6% 6%;
            padding: 22px;
            box-shadow: 
                inset 0 0 60px rgba(0,0,0,0.98),
                0 0 20px rgba(233, 69, 96, 0.12),
                inset 0 1px 2px rgba(255,255,255,0.08);
            border: 2px solid #1f1f1f;
        }

        #screenBezel {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 48% 48% 46% 46% / 6% 6% 5% 5%;
            padding: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 
                inset 0 0 30px rgba(0,0,0,0.9),
                inset 0 0 80px rgba(20,20,30,0.5);
        }

        #screenBezel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 35%;
            background: linear-gradient(180deg, 
                rgba(255,255,255,0.06) 0%,
                rgba(255,255,255,0.02) 40%,
                transparent 100%
            );
            border-radius: 48% 48% 0 0 / 20% 20% 0 0;
            pointer-events: none;
            z-index: 12;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 46% 46% 44% 44% / 4% 4% 3% 3%;
            image-rendering: pixelated;
            background: #000;
            cursor: crosshair;
        }

        #tvOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            border-radius: 48% 48% 46% 46% / 5% 5% 4% 4%;
            z-index: 10;
        }

        #tvBrand {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            color: #e94560;
            font-size: 14px;
            letter-spacing: 12px;
            text-transform: uppercase;
            opacity: 0.7;
            font-weight: bold;
            text-shadow: 
                0 0 10px rgba(233, 69, 96, 0.5),
                0 0 20px rgba(233, 69, 96, 0.3),
                0 0 40px rgba(233, 69, 96, 0.1);
            font-family: 'Press Start 2P', monospace;
            animation: brandFlicker 4s ease-in-out infinite;
        }

        @keyframes brandFlicker {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.4; }
            70% { opacity: 0.8; }
            72% { opacity: 0.3; }
            74% { opacity: 0.8; }
        }

        #tvControls {
            position: absolute;
            right: -85px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            background: linear-gradient(180deg, #1a1a1a, #0d0d0d);
            padding: 20px 12px;
            border-radius: 15px;
            border: 2px solid #333;
            box-shadow: 
                0 5px 15px rgba(0,0,0,0.8),
                inset 0 1px 2px rgba(255,255,255,0.05);
        }

        .tvKnob {
            width: 48px;
            height: 48px;
            background: radial-gradient(circle at 35% 35%, #3a3a3a, #1a1a1a);
            border-radius: 50%;
            border: 3px solid #444;
            box-shadow: 
                0 4px 10px rgba(0,0,0,0.7),
                inset 0 0 15px rgba(0,0,0,0.5),
                0 0 5px rgba(233, 69, 96, 0.1);
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .tvKnob:hover {
            transform: rotate(15deg);
        }

        .tvKnob::after {
            content: '';
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 14px;
            background: linear-gradient(180deg, #e94560, #c73e54);
            border-radius: 2px;
            box-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
        }

        .tvKnob:nth-child(2)::after {
            transform: translateX(-50%) rotate(45deg);
            top: 5px;
        }

        .tvKnob:nth-child(3)::after {
            transform: translateX(-50%) rotate(90deg);
            top: 4px;
        }

        .knobLabel {
            color: #666;
            font-size: 8px;
            letter-spacing: 1px;
            margin-top: 5px;
            font-family: 'VT323', monospace;
        }

        #volumeControl {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
            padding: 10px 5px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            border: 1px solid #333;
        }

        #volumeLabel {
            color: #e94560;
            font-size: 9px;
            letter-spacing: 1px;
            font-family: 'VT323', monospace;
            text-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
        }

        #volumeSlider {
            -webkit-appearance: none;
            appearance: none;
            width: 8px;
            height: 80px;
            background: linear-gradient(180deg, #e94560, #1a1a1a);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
        }

        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at 35% 35%, #ff6688, #e94560);
            border-radius: 50%;
            border: 2px solid #ff88aa;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.8);
            cursor: pointer;
        }

        #volumeSlider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at 35% 35%, #ff6688, #e94560);
            border-radius: 50%;
            border: 2px solid #ff88aa;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.8);
            cursor: pointer;
        }

        #musicToggle {
            width: 40px;
            height: 24px;
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 5px;
        }

        #musicToggle.active {
            border-color: #e94560;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.4);
        }

        #musicToggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: #666;
            border-radius: 50%;
            transition: all 0.3s;
        }

        #musicToggle.active::after {
            left: 20px;
            background: #e94560;
            box-shadow: 0 0 8px rgba(233, 69, 96, 0.8);
        }

        #musicLabel {
            color: #666;
            font-size: 8px;
            letter-spacing: 1px;
            font-family: 'VT323', monospace;
            margin-top: 3px;
        }

        #powerLight {
            position: absolute;
            bottom: 30px;
            right: 40px;
            width: 12px;
            height: 12px;
            background: #e94560;
            border-radius: 50%;
            box-shadow: 
                0 0 20px #e94560,
                0 0 40px rgba(233, 69, 96, 0.6),
                0 0 60px rgba(233, 69, 96, 0.3),
                inset 0 0 5px rgba(255,255,255,0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                opacity: 1; 
                box-shadow: 0 0 20px #e94560, 0 0 40px rgba(233, 69, 96, 0.6), 0 0 60px rgba(233, 69, 96, 0.3); 
            }
            50% { 
                opacity: 0.3; 
                box-shadow: 0 0 5px #e94560, 0 0 10px rgba(233, 69, 96, 0.2); 
            }
        }

        #tvReflection {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 250px;
            height: 180px;
            background: radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.04), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 11;
        }

        #tvSpeaker {
            position: absolute;
            bottom: -50px;
            right: 100px;
            width: 100px;
            height: 25px;
            background: linear-gradient(180deg, #1a1a1a, #0d0d0d);
            border-radius: 12px;
            display: flex;
            gap: 4px;
            padding: 5px 10px;
            align-items: center;
            justify-content: center;
            border: 1px solid #333;
        }

        .speakerHole {
            width: 5px;
            height: 5px;
            background: #444;
            border-radius: 50%;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
        }

        #tvVents {
            position: absolute;
            bottom: -50px;
            left: 100px;
            display: flex;
            gap: 8px;
        }

        .ventSlot {
            width: 60px;
            height: 4px;
            background: #222;
            border-radius: 2px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e94560;
            font-size: 20px;
            display: none;
            z-index: 20;
            font-family: 'Press Start 2P', monospace;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.8);
        }

        #volumeIndicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #e94560;
            border-radius: 8px;
            padding: 8px 12px;
            color: #e94560;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        #volumeIndicator.show {
            opacity: 1;
        }

        @media (max-width: 1300px) {
            #tvContainer {
                transform: scale(0.75);
            }
        }

        @media (max-width: 1000px) {
            #tvContainer {
                transform: scale(0.55);
            }
        }
    </style>

// ═══════════════════════════════════════════════════════════════════════════════
//  ENHANCED AUDIO SYSTEM — Background Music + Working Volume Controls
// ═══════════════════════════════════════════════════════════════════════════════
const AudioSys = {
    sounds: {},
    bgm: null,
    bgmPlaying: false,
    masterVolume: 1.0,
    musicVolume: 0.25,
    sfxVolume: 0.7,
    muted: false,
    initialized: false,
    currentlyPlaying: null,
    bgmStarted: false,

    init() {
        const soundFiles = {
            intro: 'assets/sounds/intro.mp3',
            lose1: 'assets/sounds/lose1.mp3',
            lose2: 'assets/sounds/lose2.mp3',
            lose3: 'assets/sounds/lose3.mp3',
            lose4: 'assets/sounds/lose4.mp3',
            levelComplete: 'assets/sounds/level_complete.mp3',
            keepLose: 'assets/sounds/keep_lose.mp3',
            afk: 'assets/sounds/afk.mp3',
            click: 'assets/sounds/click.mp3',
            hover: 'assets/sounds/hover.mp3',
            unlock: 'assets/sounds/unlock.mp3'
        };

        for (let [name, src] of Object.entries(soundFiles)) {
            this.sounds[name] = new Audio(src);
            this.sounds[name].volume = this.sfxVolume;
            this.sounds[name].addEventListener('error', () => {});
            this.sounds[name].addEventListener('ended', () => {
                if (this.currentlyPlaying === name) {
                    this.currentlyPlaying = null;
                }
            });
        }

        // Background Music Setup
        this.bgm = new Audio('assets/sounds/Background_Music.mp3');
        this.bgm.loop = true;
        this.bgm.volume = this.musicVolume;
        this.bgm.addEventListener('error', () => {
            console.warn('Background music file not found at assets/sounds/Background_Music.mp3');
        });
        this.bgm.addEventListener('ended', () => {
            this.bgm.currentTime = 0;
            if (this.bgmPlaying) this.bgm.play().catch(() => {});
        });

        this.initialized = true;
    },

    startBGM() {
        if (!this.bgm || this.bgmPlaying || this.muted) return;
        this.bgm.currentTime = 0;
        this.bgmPlaying = true;
        this.bgmStarted = true;
        this.bgm.play().catch(() => {});
    },

    stopBGM() {
        if (!this.bgm) return;
        this.bgmPlaying = false;
        this.bgm.pause();
        this.bgm.currentTime = 0;
    },

    pauseBGM() {
        if (!this.bgm || !this.bgmPlaying) return;
        this.bgm.pause();
        this.bgmPlaying = false;
    },

    resumeBGM() {
        if (!this.bgm || this.bgmPlaying || this.muted) return;
        this.bgmPlaying = true;
        this.bgm.play().catch(() => {});
    },

    setMasterVolume(vol) {
        this.masterVolume = vol;
        this.applyVolumes();
    },

    setMusicVolume(vol) {
        this.musicVolume = vol;
        if (this.bgm) this.bgm.volume = vol * this.masterVolume;
    },

    setSFXVolume(vol) {
        this.sfxVolume = vol;
        for (let [name, audio] of Object.entries(this.sounds)) {
            audio.volume = vol * this.masterVolume;
        }
    },

    applyVolumes() {
        if (this.bgm) this.bgm.volume = this.musicVolume * this.masterVolume;
        for (let [name, audio] of Object.entries(this.sounds)) {
            audio.volume = this.sfxVolume * this.masterVolume;
        }
    },

    toggleMute() {
        this.muted = !this.muted;
        if (this.muted) {
            if (this.bgm) this.bgm.volume = 0;
            for (let audio of Object.values(this.sounds)) {
                audio.volume = 0;
            }
        } else {
            this.applyVolumes();
            if (this.bgmStarted && !this.bgmPlaying) {
                this.resumeBGM();
            }
        }
        return this.muted;
    },

    toggleMusic() {
        if (this.bgmPlaying) {
            this.pauseBGM();
            return false;
        } else {
            this.startBGM();
            return true;
        }
    },

    play(name) {
        if (this.muted || !this.sounds[name]) return;
        if (this.currentlyPlaying && this.currentlyPlaying !== name) {
            this.stop(this.currentlyPlaying);
        }
        const s = this.sounds[name];
        s.currentTime = 0;
        s.play().catch(() => {});
        if (['lose1', 'lose2', 'lose3', 'lose4', 'keepLose'].includes(name)) {
            this.currentlyPlaying = name;
        }
    },

    playRandomLose() {
        const loses = ['lose1', 'lose2', 'lose3', 'lose4'];
        const random = loses[Math.floor(Math.random() * loses.length)];
        this.play(random);
    },

    stop(name) {
        if (this.sounds[name]) {
            this.sounds[name].pause();
            this.sounds[name].currentTime = 0;
        }
        if (this.currentlyPlaying === name) {
            this.currentlyPlaying = null;
        }
    },

    stopAllLoseSounds() {
        ['lose1', 'lose2', 'lose3', 'lose4', 'keepLose'].forEach(sound => {
            this.stop(sound);
        });
        this.currentlyPlaying = null;
    }
};

// ═══════════════════════════════════════════════════════════════════════════════
//  VOLUME CONTROL UI MANAGER
// ═══════════════════════════════════════════════════════════════════════════════
const VolumeControl = {
    slider: null,
    toggle: null,
    indicator: null,
    indicatorTimer: null,

    init() {
        this.slider = document.getElementById('volumeSlider');
        this.toggle = document.getElementById('musicToggle');
        this.indicator = document.getElementById('volumeIndicator');

        if (!this.slider || !this.toggle) return;

        // Volume slider input
        this.slider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            AudioSys.setMasterVolume(val / 100);
            this.showIndicator(`VOL: ${val}%`);
            this.updateKnobRotation(val);
        });

        this.slider.addEventListener('change', (e) => {
            const val = parseInt(e.target.value);
            AudioSys.setMusicVolume(val / 100);
            this.showIndicator(`MUSIC: ${val}%`);
        });

        // Music toggle
        this.toggle.addEventListener('click', () => {
            const isPlaying = AudioSys.toggleMusic();
            this.toggle.classList.toggle('active', isPlaying);
            this.showIndicator(isPlaying ? 'MUSIC: ON' : 'MUSIC: OFF');
            AudioSys.play('click');
        });

        // Vol knob click to mute/unmute MUSIC only
        const volKnob = document.getElementById('volKnob');
        if (volKnob) {
            volKnob.addEventListener('click', () => {
                if (AudioSys.musicVolume > 0) {
                    AudioSys._prevMusicVol = AudioSys.musicVolume;
                    AudioSys.setMusicVolume(0);
                    this.slider.value = 0;
                    this.updateKnobRotation(0);
                    this.showIndicator('MUSIC: MUTED');
                } else {
                    const restoreVol = AudioSys._prevMusicVol || 0.25;
                    AudioSys.setMusicVolume(restoreVol);
                    this.slider.value = Math.round(restoreVol * 100);
                    this.updateKnobRotation(Math.round(restoreVol * 100));
                    this.showIndicator(`MUSIC: ${Math.round(restoreVol * 100)}%`);
                }
            });
        }
    },

    showIndicator(text) {
        if (!this.indicator) return;
        this.indicator.textContent = text;
        this.indicator.classList.add('show');
        clearTimeout(this.indicatorTimer);
        this.indicatorTimer = setTimeout(() => {
            this.indicator.classList.remove('show');
        }, 1500);
    },

    updateKnobRotation(val) {
        const volKnob = document.getElementById('volKnob');
        if (volKnob) {
            volKnob.style.transform = `rotate(${val * 3.6}deg)`;
        }
    }
};

//  CRT TV EFFECTS ENGINE
// ═══════════════════════════════════════════════════════════════════════════════
const CRT = {
    scanlineOffset: 0,
    noiseSeed: 0,
    flicker: 0,

    draw() {
        overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

        overlayCtx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        for (let y = 0; y < overlayCanvas.height; y += 3) {
            overlayCtx.fillRect(0, y + this.scanlineOffset, overlayCanvas.width, 1);
        }
        this.scanlineOffset = (this.scanlineOffset + 0.5) % 3;

        overlayCtx.globalCompositeOperation = 'screen';
        for (let y = 0; y < overlayCanvas.height; y += 3) {
            overlayCtx.fillStyle = 'rgba(255, 0, 0, 0.015)';
            overlayCtx.fillRect(1, y, overlayCanvas.width, 1);
            overlayCtx.fillStyle = 'rgba(0, 255, 0, 0.015)';
            overlayCtx.fillRect(2, y + 1, overlayCanvas.width, 1);
            overlayCtx.fillStyle = 'rgba(0, 0, 255, 0.015)';
            overlayCtx.fillRect(0, y + 2, overlayCanvas.width, 1);
        }

        overlayCtx.fillStyle = 'rgba(255, 0, 0, 0.03)';
        overlayCtx.fillRect(3, 0, overlayCanvas.width, overlayCanvas.height);
        overlayCtx.fillStyle = 'rgba(0, 255, 255, 0.03)';
        overlayCtx.fillRect(-3, 0, overlayCanvas.width, overlayCanvas.height);
        overlayCtx.globalCompositeOperation = 'source-over';

        const gradient = overlayCtx.createRadialGradient(
            overlayCanvas.width/2, overlayCanvas.height/2, 150,
            overlayCanvas.width/2, overlayCanvas.height/2, 550
        );
        gradient.addColorStop(0, 'rgba(0,0,0,0)');
        gradient.addColorStop(0.7, 'rgba(0,0,0,0.2)');
        gradient.addColorStop(1, 'rgba(0,0,0,0.6)');
        overlayCtx.fillStyle = gradient;
        overlayCtx.fillRect(0, 0, overlayCanvas.width, overlayCanvas.height);

        const curveGrad = overlayCtx.createLinearGradient(0, 0, 0, overlayCanvas.height);
        curveGrad.addColorStop(0, 'rgba(0,0,0,0.5)');
        curveGrad.addColorStop(0.1, 'rgba(0,0,0,0)');
        curveGrad.addColorStop(0.9, 'rgba(0,0,0,0)');
        curveGrad.addColorStop(1, 'rgba(0,0,0,0.5)');
        overlayCtx.fillStyle = curveGrad;
        overlayCtx.fillRect(0, 0, overlayCanvas.width, overlayCanvas.height);

        const hCurveGrad = overlayCtx.createLinearGradient(0, 0, overlayCanvas.width, 0);
        hCurveGrad.addColorStop(0, 'rgba(0,0,0,0.3)');
        hCurveGrad.addColorStop(0.08, 'rgba(0,0,0,0)');
        hCurveGrad.addColorStop(0.92, 'rgba(0,0,0,0)');
        hCurveGrad.addColorStop(1, 'rgba(0,0,0,0.3)');
        overlayCtx.fillStyle = hCurveGrad;
        overlayCtx.fillRect(0, 0, overlayCanvas.width, overlayCanvas.height);

        this.flicker = Math.random() > 0.96 ? 0.1 : 0;
        if (this.flicker > 0) {
            overlayCtx.fillStyle = `rgba(255,255,255,${this.flicker})`;
            overlayCtx.fillRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        }

        this.noiseSeed++;
        if (this.noiseSeed % 2 === 0) {
            for (let i = 0; i < 80; i++) {
                const x = Math.random() * overlayCanvas.width;
                const y = Math.random() * overlayCanvas.height;
                const col = Math.random() > 0.5 ? 255 : 0;
                overlayCtx.fillStyle = `rgba(${col},${col},${col},${Math.random() * 0.03})`;
                overlayCtx.fillRect(x, y, 2, 1);
            }
        }

        if (Math.random() > 0.992) {
            const barY = Math.random() * overlayCanvas.height;
            overlayCtx.fillStyle = 'rgba(255,255,255,0.06)';
            overlayCtx.fillRect(0, barY, overlayCanvas.width, 3);
        }

        overlayCtx.fillStyle = 'rgba(0,0,0,0.2)';
        overlayCtx.beginPath();
        overlayCtx.moveTo(0, 0);
        overlayCtx.lineTo(60, 0);
        overlayCtx.lineTo(0, 60);
        overlayCtx.closePath();
        overlayCtx.fill();

        overlayCtx.beginPath();
        overlayCtx.moveTo(overlayCanvas.width, 0);
        overlayCtx.lineTo(overlayCanvas.width - 60, 0);
        overlayCtx.lineTo(overlayCanvas.width, 60);
        overlayCtx.closePath();
        overlayCtx.fill();

        overlayCtx.beginPath();
        overlayCtx.moveTo(0, overlayCanvas.height);
        overlayCtx.lineTo(60, overlayCanvas.height);
        overlayCtx.lineTo(0, overlayCanvas.height - 60);
        overlayCtx.closePath();
        overlayCtx.fill();

        overlayCtx.beginPath();
        overlayCtx.moveTo(overlayCanvas.width, overlayCanvas.height);
        overlayCtx.lineTo(overlayCanvas.width - 60, overlayCanvas.height);
        overlayCtx.lineTo(overlayCanvas.width, overlayCanvas.height - 60);
        overlayCtx.closePath();
        overlayCtx.fill();
    }
};

// ═══════════════════════════════════════════════════════════════════════════════
//  SAVE SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════
const SaveSystem = {
    getProgress() {
        try {
            const data = localStorage.getItem('hamada_progress_v2');
            return data ? JSON.parse(data) : { completed: [], deaths: 0, firstTime: true };
        } catch { return { completed: [], deaths: 0, firstTime: true }; }
    },
    saveProgress(completed, deaths) {
        const data = { completed, deaths, firstTime: false };
        localStorage.setItem('hamada_progress_v2', JSON.stringify(data));
    },
    isLevelUnlocked(levelIndex) {
        // DEMO MODE: Only first 4 levels (0-3) are playable
        if (levelIndex >= 4) return false;
        if (levelIndex === 0) return true;
        return this.getProgress().completed.includes(levelIndex - 1);
    },
    completeLevel(levelIndex, deaths) {
        const progress = this.getProgress();
        if (!progress.completed.includes(levelIndex)) progress.completed.push(levelIndex);
        progress.deaths = deaths;
        this.saveProgress(progress.completed, progress.deaths);
    },
    unlockAll() {
        // DEMO MODE: No effect - levels 5-10 stay locked
        const progress = this.getProgress();
        progress.deaths = progress.deaths || 0;
        this.saveProgress(progress.completed, progress.deaths);
    },
    reset() {
        localStorage.removeItem('hamada_progress_v2');
    }
};

    MAIN_MENU: 'mainMenu',
    LEVEL_SELECT: 'levelSelect',

// ═══════════════════════════════════════════════════════════════════════════════
//  PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════
class ParticleSystem {
    constructor() {
        this.particles = [];
    }

    emit(x, y, color, count = 10, speed = 6) {
        for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
            const vel = Math.random() * speed + 2;
            this.particles.push({
                x, y,
                vx: Math.cos(angle) * vel,
                vy: Math.sin(angle) * vel,
                life: 1.0,
                decay: 0.015 + Math.random() * 0.02,
                color,
                size: 2 + Math.random() * 5,
                gravity: 0.15,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.2
            });
        }
    }

    update() {
        this.particles = this.particles.filter(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += p.gravity;
            p.vx *= 0.98;
            p.life -= p.decay;
            p.rotation += p.rotSpeed;
            return p.life > 0;
        });
    }

    draw(ctx, camera) {
        this.particles.forEach(p => {
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.translate(p.x - (camera ? camera.x : 0), p.y - (camera ? camera.y : 0));
            ctx.rotate(p.rotation);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
            ctx.restore();
        });
        ctx.globalAlpha = 1;
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  SCREEN SHAKE
// ═══════════════════════════════════════════════════════════════════════════════
const ScreenShake = {
    intensity: 0,
    duration: 0,
    trigger(intensity, duration) {
        this.intensity = intensity;
        this.duration = duration;
    },
    update() {
        if (this.duration > 0) {
            this.duration--;
            this.intensity *= 0.9;
        } else {
            this.intensity = 0;
        }
    },
    getOffset() {
        if (this.intensity <= 0) return { x: 0, y: 0 };
        return {
            x: (Math.random() - 0.5) * this.intensity,
            y: (Math.random() - 0.5) * this.intensity
        };
    }
};

// ═══════════════════════════════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════════════════════════════
class Camera {
    constructor() {
        this.x = 0;
        this.y = 0;
        this.targetX = 0;
        this.targetY = 0;
        this.smooth = 0.08;
    }
    follow(target, levelWidth, levelHeight) {
        this.targetX = target.x - canvas.width / 2 + target.width / 2;
        this.targetY = target.y - canvas.height / 2 + target.height / 2;
        this.targetX = Math.max(0, Math.min(this.targetX, levelWidth - canvas.width));
        this.targetY = Math.max(-100, Math.min(this.targetY, levelHeight - canvas.height));
        this.x += (this.targetX - this.x) * this.smooth;
        this.y += (this.targetY - this.y) * this.smooth;
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  PLAYER (HAMADA)
// ═══════════════════════════════════════════════════════════════════════════════
class Player {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 28;
        this.height = 44;
        this.vx = 0;
        this.vy = 0;
        this.speed = 4.5;
        this.jumpPower = -11;
        this.gravity = 0.55;
        this.grounded = false;
        this.dead = false;
        this.facing = 1;
        this.animFrame = 0;
        this.animTimer = 0;
        this.color = '#e94560';
        this.trail = [];
        this.coyoteTime = 0;
        this.maxCoyote = 6;
        this.jumpBuffer = 0;
        this.maxJumpBuffer = 6;
        this.blinkTimer = 0;
        this.squashX = 1;
        this.squashY = 1;
    }

    update(input, level) {
        if (this.dead) return;

        if (this.grounded) this.coyoteTime = this.maxCoyote;
        else this.coyoteTime--;

        if (input.keys['ArrowUp'] || input.keys['w'] || input.keys[' ']) {
            this.jumpBuffer = this.maxJumpBuffer;
        } else {
            this.jumpBuffer--;
        }

        if (input.keys['ArrowLeft'] || input.keys['a']) {
            this.vx = Math.max(this.vx - 0.5, -this.speed);
            this.facing = -1;
        } else if (input.keys['ArrowRight'] || input.keys['d']) {
            this.vx = Math.min(this.vx + 0.5, this.speed);
            this.facing = 1;
        } else {
            this.vx *= 0.82;
        }

        if (this.jumpBuffer > 0 && this.coyoteTime > 0) {
            this.vy = this.jumpPower;
            this.grounded = false;
            this.coyoteTime = 0;
            this.jumpBuffer = 0;
            this.squashX = 0.7;
            this.squashY = 1.3;
            Game.particles.emit(this.x + this.width/2, this.y + this.height, '#aaa', 5, 3);
        }

        if (!input.keys['ArrowUp'] && !input.keys['w'] && !input.keys[' '] && this.vy < -4) {
            this.vy *= 0.7;
        }

        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;

        this.squashX += (1 - this.squashX) * 0.15;
        this.squashY += (1 - this.squashY) * 0.15;

        if (Math.abs(this.vx) > 2 || Math.abs(this.vy) > 2) {
            this.trail.push({
                x: this.x, 
                y: this.y, 
                alpha: 0.5, 
                width: this.width, 
                height: this.height,
                frame: this.animFrame
            });
        }
        this.trail = this.trail.filter(t => {
            t.alpha -= 0.04;
            return t.alpha > 0;
        });

        this.grounded = false;

        level.platforms.forEach(plat => {
            if (this.checkCollision(plat)) this.resolveCollision(plat);
        });

        level.movingPlatforms.forEach(plat => {
            if (this.checkCollision(plat)) {
                this.resolveCollision(plat);
                if (this.grounded) {
                    this.x += plat.vx || 0;
                    this.y += plat.vy || 0;
                }
            }
        });

        level.fakePlatforms.forEach(plat => {
            if (this.checkCollision(plat) && this.vy > 0 && this.y < plat.y + 10) {
                plat.broken = true;
                Game.particles.emit(plat.x + plat.width/2, plat.y, '#555', 8, 3);
            }
        });

        level.hazards.forEach(hazard => {
            if (this.checkCollision(hazard)) this.die();
        });

        level.traps.forEach(trap => {
            if (trap.active && this.checkCollision(trap)) this.die();
        });

        level.hiddenSpikes.forEach(spike => {
            if (!spike.triggered && this.checkCollision(spike)) {
                spike.triggered = true;
                Game.particles.emit(spike.x + spike.width / 2, spike.y + spike.height / 2, '#ff2244', 14, 5);
                ScreenShake.trigger(8, 15);
                AudioSys.playRandomLose();
            }
            if (spike.triggered && this.checkCollision(spike)) {
                this.die();
            }
        });

        if (level.levelIndex === 3 && this.x + this.width <= -5) {
            const tp = level.teleports[0] || {destX: level.goal.x, destY: level.goal.y};
            if (!tp.used) {
                tp.used = true;
                this.x = tp.destX;
                this.y = tp.destY;
                this.vx = 0;
                this.vy = 0;
                this.grounded = false;
                Game.particles.emit(this.x + this.width / 2, this.y + this.height / 2, '#00ff88', 24, 6);
            }
        } else {
            level.teleports.forEach(tp => {
                if (!tp.used && this.checkCollision(tp)) {
                    tp.used = true;
                    this.x = tp.destX;
                    this.y = tp.destY;
                    this.vx = 0;
                    this.vy = 0;
                    this.grounded = false;
                    Game.particles.emit(this.x + this.width / 2, this.y + this.height / 2, '#00ff88', 24, 6);
                }
            });
        }

        level.projectiles.forEach(proj => {
            if (this.checkCollision(proj)) this.die();
        });

        if (this.checkCollision(level.goal)) {
            Game.triggerLevelComplete();
        }

        if (this.y > 900) this.die();

        this.animTimer++;
        if (this.animTimer > 6) {
            this.animFrame = (this.animFrame + 1) % 4;
            this.animTimer = 0;
        }

        this.blinkTimer++;
    }

    checkCollision(rect) {
        return this.x < rect.x + rect.width &&
               this.x + this.width > rect.x &&
               this.y < rect.y + rect.height &&
               this.y + this.height > rect.y;
    }

    resolveCollision(plat) {
        const overlapX = Math.min(this.x + this.width - plat.x, plat.x + plat.width - this.x);
        const overlapY = Math.min(this.y + this.height - plat.y, plat.y + plat.height - this.y);

        if (overlapX < overlapY) {
            if (this.x < plat.x) this.x = plat.x - this.width;
            else this.x = plat.x + plat.width;
            this.vx = 0;
        } else {
            if (this.y < plat.y) {
                this.y = plat.y - this.height;
                this.vy = 0;
                this.grounded = true;
                if (this.vy > 2) {
                    this.squashX = 1.2;
                    this.squashY = 0.8;
                }
            } else {
                this.y = plat.y + plat.height;
                this.vy = 0;
            }
        }
    }

    die() {
        if (this.dead) return;
        this.dead = true;
        Game.particles.emit(this.x + this.width/2, this.y + this.height/2, '#e94560', 25, 7);
        Game.particles.emit(this.x + this.width/2, this.y + this.height/2, '#ff8800', 15, 5);
        Game.particles.emit(this.x + this.width/2, this.y + this.height/2, '#ffcc00', 10, 4);
        ScreenShake.trigger(12, 20);
        Game.deathCount++;

        AudioSys.stopAllLoseSounds();

        if (Game.deathCount >= 5 && Game.deathCount % 5 === 0) {
            setTimeout(() => AudioSys.play('keepLose'), 400);
        } else {
            AudioSys.playRandomLose();
        }

        setTimeout(() => Game.respawn(), 1200);
    }

    draw(ctx, camera) {
        const shake = ScreenShake.getOffset();
        const drawX = this.x - camera.x + shake.x;
        const drawY = this.y - camera.y + shake.y;

        this.trail.forEach(t => {
            ctx.save();
            ctx.globalAlpha = t.alpha * 0.2;
            ctx.translate(t.x - camera.x + t.width/2, t.y - camera.y + t.height/2);
            ctx.scale(1 + (1-t.alpha)*0.3, 1 + (1-t.alpha)*0.3);
            ctx.fillStyle = this.color;
            ctx.fillRect(-t.width/2, -t.height/2, t.width, t.height);
            ctx.restore();
        });
        ctx.globalAlpha = 1;

        if (this.dead) return;

        const imgW = 49;
        const imgH = 50;
        const drawW = imgW * this.squashX;
        const drawH = imgH * this.squashY;
        const imgX = drawX - (drawW - this.width) / 2;
        const imgY = drawY - (drawH - this.height) + 2;

        if (SpriteSheetLoaded) {
            ctx.save();
            if (this.facing === -1) {
                ctx.translate(imgX + drawW, imgY);
                ctx.scale(-1, 1);
                ctx.drawImage(SpriteSheetCanvas, 0, 0, imgW, imgH, 0, 0, drawW, drawH);
            } else {
                ctx.drawImage(SpriteSheetCanvas, 0, 0, imgW, imgH, imgX, imgY, drawW, drawH);
            }
            ctx.restore();
        } else {
            ctx.fillStyle = '#e94560';
            ctx.fillRect(drawX, drawY, this.width, this.height);
        }

        if (Math.abs(this.vx) > 3) {
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 10;
            ctx.strokeStyle = 'rgba(233, 69, 96, 0.3)';
            ctx.lineWidth = 2;
            ctx.strokeRect(drawX - 2, drawY - 2, this.width + 4, this.height + 4);
            ctx.shadowBlur = 0;
        }
    }

    reset(x, y) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.dead = false;
        this.trail = [];
        this.coyoteTime = 0;
        this.jumpBuffer = 0;
        this.squashX = 1;
        this.squashY = 1;
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  BACKGROUND SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════
class Background {
    constructor(levelIndex) {
        this.levelIndex = levelIndex;
        this.stars = [];
        this.clouds = [];
        this.time = 0;
        this.particles = [];

        if (levelIndex >= 6) {
            for (let i = 0; i < 150; i++) {
                this.stars.push({
                    x: Math.random() * 3000,
                    y: Math.random() * 800,
                    size: Math.random() * 2.5 + 0.5,
                    twinkle: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }

        if (levelIndex < 4) {
            for (let i = 0; i < 10; i++) {
                this.clouds.push({
                    x: Math.random() * 3000,
                    y: Math.random() * 200 + 50,
                    width: 80 + Math.random() * 120,
                    speed: 0.2 + Math.random() * 0.6
                });
            }
        }

        for (let i = 0; i < 30; i++) {
            this.particles.push({
                x: Math.random() * 3000,
                y: Math.random() * 800,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                size: Math.random() * 2 + 1,
                alpha: Math.random() * 0.3 + 0.1,
                pulse: Math.random() * Math.PI * 2
            });
        }
    }

    update() {
        this.time += 0.01;
        this.clouds.forEach(c => {
            c.x += c.speed;
            if (c.x > 3000) c.x = -300;
        });
        this.particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.pulse += 0.02;
            if (p.x < 0) p.x = 3000;
            if (p.x > 3000) p.x = 0;
            if (p.y < 0) p.y = 800;
            if (p.y > 800) p.y = 0;
        });
    }

    draw(ctx, camera) {
        const colors = [
            ['#0a0a1a', '#1a1a3e', '#e94560'],
            ['#120a1a', '#2a1a4e', '#e94560'],
            ['#0a1420', '#1a2e4e', '#e94560'],
            ['#141414', '#2a2a3a', '#e94560'],
            ['#2a0a0a', '#4a1a1a', '#e94560'],
            ['#0a2a14', '#1a4a2e', '#e94560'],
            ['#1a0a2a', '#3a1a4a', '#e94560'],
            ['#080818', '#1a1a3a', '#e94560'],
            ['#1a1505', '#3a2e0a', '#e94560'],
            ['#0a0000', '#1a0000', '#e94560']
        ];

        const [topColor, bottomColor, accentColor] = colors[this.levelIndex] || colors[0];

        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, topColor);
        grad.addColorStop(0.5, bottomColor);
        grad.addColorStop(1, bottomColor);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = accentColor + '08';
        ctx.lineWidth = 1;
        const gridOffsetX = -camera.x % 50;
        const gridOffsetY = -camera.y % 50;
        for (let x = gridOffsetX; x < canvas.width; x += 50) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
        }
        for (let y = gridOffsetY; y < canvas.height; y += 50) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }

        ctx.strokeStyle = accentColor + '04';
        const grid2OffsetX = -camera.x * 0.5 % 100;
        const grid2OffsetY = -camera.y * 0.5 % 100;
        for (let x = grid2OffsetX; x < canvas.width; x += 100) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
        }
        for (let y = grid2OffsetY; y < canvas.height; y += 100) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }

        this.particles.forEach(p => {
            const px = p.x - camera.x * 0.3;
            const py = p.y - camera.y * 0.3;
            if (px > -10 && px < canvas.width + 10 && py > -10 && py < canvas.height + 10) {
                const alpha = p.alpha * (0.5 + Math.sin(p.pulse) * 0.5);
                ctx.fillStyle = accentColor + Math.floor(alpha * 255).toString(16).padStart(2, '0');
                ctx.fillRect(px, py, p.size, p.size);
            }
        });

        if (this.levelIndex >= 6) {
            this.stars.forEach(star => {
                const sx = star.x - camera.x * 0.3;
                const sy = star.y - camera.y * 0.3;
                if (sx > -10 && sx < canvas.width + 10 && sy > -10 && sy < canvas.height + 10) {
                    const twinkle = Math.sin(this.time + star.twinkle) * 0.5 + 0.5;
                    ctx.fillStyle = `rgba(255, 255, 255, ${twinkle * 0.8})`;
                    ctx.fillRect(sx, sy, star.size, star.size);
                    if (star.size > 2) {
                        ctx.fillStyle = `rgba(255, 255, 255, ${twinkle * 0.15})`;
                        ctx.fillRect(sx - 1, sy - 1, star.size + 2, star.size + 2);
                    }
                }
            });
        }

        if (this.levelIndex < 4) {
            this.clouds.forEach(c => {
                const cx = c.x - camera.x * 0.2;
                const cy = c.y - camera.y * 0.1;
                if (cx > -300 && cx < canvas.width + 300) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
                    ctx.fillRect(cx, cy, c.width, 25);
                    ctx.fillRect(cx + 25, cy - 12, c.width - 50, 18);
                    ctx.fillRect(cx + 50, cy - 5, c.width - 100, 12);
                }
            });
        }

        if (this.levelIndex === 4) {
            ctx.strokeStyle = 'rgba(100, 150, 255, 0.12)';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < 40; i++) {
                const rx = ((i * 73 + this.time * 120) % (canvas.width + 100)) - 50;
                const ry = ((i * 37 + this.time * 250) % canvas.height);
                const wind = Math.sin(this.time * 2 + i) * 3;
                ctx.beginPath();
                ctx.moveTo(rx + wind, ry);
                ctx.lineTo(rx + wind - 3, ry + 18);
                ctx.stroke();
            }
            if (Math.random() > 0.998) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        if (this.levelIndex === 9) {
            for (let i = 0; i < 30; i++) {
                const bx = ((i * 137 + this.time * 30) % 3000) - camera.x * 0.1;
                const by = ((i * 53 + Math.sin(this.time + i) * 50) % 800) - camera.y * 0.1;
                if (bx > 0 && bx < canvas.width && by > 0 && by < canvas.height) {
                    const pulse = Math.sin(this.time * 2 + i) * 0.5 + 0.5;
                    ctx.fillStyle = `rgba(200, 0, 0, ${0.15 * pulse})`;
                    ctx.fillRect(bx, by, 4, 4);
                }
            }
        }

        if (this.levelIndex === 5) {
            ctx.fillStyle = 'rgba(0, 255, 100, 0.03)';
            for (let i = 0; i < 5; i++) {
                const fx = ((i * 300 + this.time * 20) % (canvas.width + 200)) - 100;
                const fy = canvas.height - 100 + Math.sin(this.time + i) * 30;
                ctx.fillRect(fx, fy, 200, 80);
            }
        }
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  LEVEL CLASS
// ═══════════════════════════════════════════════════════════════════════════════
class Level {
    constructor(data, levelIndex) {
        this.platforms = data.platforms || [];
        this.hazards = data.hazards || [];
        this.movingPlatforms = data.movingPlatforms || [];
        this.fakePlatforms = data.fakePlatforms || [];
        this.goal = data.goal || {x: 0, y: 0, width: 40, height: 60};
        this.playerStart = data.playerStart || {x: 100, y: 300};
        this.width = data.width || 2000;
        this.height = data.height || 700;
        this.traps = data.traps || [];
        this.hiddenSpikes = data.hiddenSpikes || [];
        this.teleports = data.teleports || [];
        this.projectiles = data.projectiles || [];
        this.background = new Background(levelIndex);
        this.levelIndex = levelIndex;
        this.projectileTimer = 0;
        this.lavaGlow = 0;
    }

    update() {
        this.background.update();
        this.lavaGlow += 0.05;

        this.movingPlatforms.forEach(mp => {
            mp.x += mp.vx || 0;
            mp.y += mp.vy || 0;
            if (mp.maxX !== undefined && (mp.x > mp.maxX || mp.x < mp.minX)) mp.vx *= -1;
            if (mp.maxY !== undefined && (mp.y > mp.maxY || mp.y < mp.minY)) mp.vy *= -1;
        });

        this.traps.forEach(trap => {
            if (trap.timer !== undefined) {
                trap.timer++;
                if (trap.timer > trap.interval) {
                    trap.active = !trap.active;
                    trap.timer = 0;
                }
            }
        });

        this.projectileTimer++;
        this.projectiles.forEach(proj => {
            proj.x += proj.vx;
            proj.y += proj.vy;
            if (proj.x < proj.minX || proj.x > proj.maxX || proj.y < proj.minY || proj.y > proj.maxY) {
                proj.x = proj.startX;
                proj.y = proj.startY;
            }
        });

        if (this.levelIndex === 9 && this.projectileTimer % 120 === 0) {
            this.projectiles.push({
                x: 200 + Math.random() * 1000,
                y: -20,
                startX: 200 + Math.random() * 1000,
                startY: -20,
                vx: 0,
                vy: 3 + Math.random() * 2,
                width: 12,
                height: 12,
                minX: -100,
                maxX: 2000,
                minY: -50,
                maxY: 700
            });
            if (this.projectiles.length > 15) this.projectiles.shift();
        }
    }

    draw(ctx, camera) {
        this.background.draw(ctx, camera);

        this.platforms.forEach(p => {
            const px = p.x - camera.x;
            const py = p.y - camera.y;
            if (px + p.width < -50 || px > canvas.width + 50) return;

            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(px + 4, py + 4, p.width, p.height);

            const platGrad = ctx.createLinearGradient(px, py, px, py + p.height);
            platGrad.addColorStop(0, '#1a1a4e');
            platGrad.addColorStop(1, '#0f0f2e');
            ctx.fillStyle = platGrad;
            ctx.fillRect(px, py, p.width, p.height);

            ctx.fillStyle = '#2a2a6e';
            ctx.fillRect(px, py, p.width, 5);

            ctx.fillStyle = 'rgba(233, 69, 96, 0.1)';
            ctx.fillRect(px + 2, py + 2, p.width - 4, 2);

            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.strokeRect(px, py, p.width, p.height);

            ctx.strokeStyle = 'rgba(233, 69, 96, 0.3)';
            ctx.lineWidth = 1;
            ctx.strokeRect(px + 2, py + 2, p.width - 4, p.height - 4);

            ctx.strokeStyle = 'rgba(233, 69, 96, 0.15)';
            ctx.lineWidth = 1;
            for (let i = 20; i < p.width; i += 35) {
                ctx.beginPath();
                ctx.moveTo(px + i, py + 5);
                ctx.lineTo(px + i, py + p.height - 5);
                ctx.stroke();
            }

            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 5;
            ctx.fillStyle = '#e94560';
            ctx.fillRect(px, py, 5, 5);
            ctx.fillRect(px + p.width - 5, py, 5, 5);
            ctx.fillRect(px, py + p.height - 5, 5, 5);
            ctx.fillRect(px + p.width - 5, py + p.height - 5, 5, 5);
            ctx.shadowBlur = 0;
        });

        this.movingPlatforms.forEach(p => {
            const px = p.x - camera.x;
            const py = p.y - camera.y;
            if (px + p.width < -50 || px > canvas.width + 50) return;

            const moveGrad = ctx.createLinearGradient(px, py, px, py + p.height);
            moveGrad.addColorStop(0, '#1a3a6e');
            moveGrad.addColorStop(1, '#0f2040');
            ctx.fillStyle = moveGrad;
            ctx.fillRect(px, py, p.width, p.height);

            ctx.strokeStyle = '#00aaff';
            ctx.lineWidth = 2;
            ctx.strokeRect(px, py, p.width, p.height);

            ctx.fillStyle = 'rgba(0, 170, 255, 0.1)';
            ctx.fillRect(px + 2, py + 2, p.width - 4, p.height - 4);

            ctx.shadowColor = '#00aaff';
            ctx.shadowBlur = 8;
            ctx.fillStyle = '#00aaff';
            if (p.vx) {
                ctx.fillRect(px + p.width/2 - 5, py + 5, 10, 4);
                ctx.fillRect(px + p.width/2 + (p.vx > 0 ? 4 : -7), py + 2, 4, 10);
            }
            if (p.vy) {
                ctx.fillRect(px + p.width/2 - 2, py + 5, 4, 10);
                ctx.fillRect(px + p.width/2 - 5, py + (p.vy > 0 ? 10 : 2), 12, 4);
            }
            ctx.shadowBlur = 0;
        });

        this.fakePlatforms.forEach(p => {
            if (p.broken) return;
            const px = p.x - camera.x;
            const py = p.y - camera.y;
            if (px + p.width < -50 || px > canvas.width + 50) return;

            const fakeGrad = ctx.createLinearGradient(px, py, px, py + p.height);
            fakeGrad.addColorStop(0, '#1a1a4e');
            fakeGrad.addColorStop(1, '#0f0f2e');
            ctx.fillStyle = fakeGrad;
            ctx.fillRect(px, py, p.width, p.height);

            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.strokeRect(px, py, p.width, p.height);

            ctx.strokeStyle = 'rgba(200, 100, 100, 0.15)';
            ctx.setLineDash([3, 3]);
            ctx.lineWidth = 1;
            ctx.strokeRect(px + 3, py + 3, p.width - 6, p.height - 6);
            ctx.setLineDash([]);

            ctx.fillStyle = '#e94560';
            ctx.fillRect(px, py, 4, 4);
            ctx.fillRect(px + p.width - 4, py, 4, 4);
            ctx.fillRect(px, py + p.height - 4, 4, 4);
            ctx.fillRect(px + p.width - 4, py + p.height - 4, 4, 4);
        });

        this.hazards.forEach(h => {
            const hx = h.x - camera.x;
            const hy = h.y - camera.y;
            if (hx + h.width < -50 || hx > canvas.width + 50) return;

            const spikeCount = Math.floor(h.width / 16);
            for (let i = 0; i < spikeCount; i++) {
                const sx = hx + i * 16;

                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.moveTo(sx + 3, hy + h.height + 3);
                ctx.lineTo(sx + 10 + 3, hy + 3);
                ctx.lineTo(sx + 16 + 3, hy + h.height + 3);
                ctx.closePath();
                ctx.fill();

                const spikeGrad = ctx.createLinearGradient(sx + 8, hy, sx + 8, hy + h.height);
                spikeGrad.addColorStop(0, '#ff4466');
                spikeGrad.addColorStop(1, '#cc0022');
                ctx.fillStyle = spikeGrad;
                ctx.beginPath();
                ctx.moveTo(sx, hy + h.height);
                ctx.lineTo(sx + 8, hy);
                ctx.lineTo(sx + 16, hy + h.height);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#ff88aa';
                ctx.beginPath();
                ctx.moveTo(sx + 3, hy + h.height);
                ctx.lineTo(sx + 8, hy + 3);
                ctx.lineTo(sx + 11, hy + h.height);
                ctx.closePath();
                ctx.fill();

                ctx.shadowColor = '#ff2244';
                ctx.shadowBlur = 5;
                ctx.fillStyle = '#ff6688';
                ctx.fillRect(sx + 7, hy, 2, 4);
                ctx.shadowBlur = 0;
            }
        });

        this.hiddenSpikes.forEach(spike => {
            if (!spike.triggered) return;
            const hx = spike.x - camera.x;
            const hy = spike.y - camera.y;
            const spikeCount = Math.max(1, Math.floor(spike.width / 16));
            for (let i = 0; i < spikeCount; i++) {
                const sx = hx + i * 16;
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.moveTo(sx + 3, hy + spike.height + 3);
                ctx.lineTo(sx + 10 + 3, hy + 3);
                ctx.lineTo(sx + 16 + 3, hy + spike.height + 3);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.moveTo(sx, hy + spike.height);
                ctx.lineTo(sx + 8, hy);
                ctx.lineTo(sx + 16, hy + spike.height);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#ff99aa';
                ctx.beginPath();
                ctx.moveTo(sx + 2, hy + spike.height);
                ctx.lineTo(sx + 8, hy + 3);
                ctx.lineTo(sx + 10, hy + spike.height);
                ctx.closePath();
                ctx.fill();
            }
        });

        this.teleports.forEach(tp => {
            const tx = tp.x - camera.x;
            const ty = tp.y - camera.y;
            ctx.save();
            ctx.globalAlpha = 0;
            ctx.fillStyle = '#00ff88';
            ctx.fillRect(tx, ty, tp.width, tp.height);
            ctx.strokeStyle = '#00aa66';
            ctx.lineWidth = 0;
            ctx.strokeRect(tx, ty, tp.width, tp.height);
            ctx.restore();
        });

        this.traps.forEach(trap => {
            const tx = trap.x - camera.x;
            const ty = trap.y - camera.y;
            if (trap.active) {
                ctx.shadowColor = '#ff4400';
                ctx.shadowBlur = 20;
                const trapGrad = ctx.createRadialGradient(
                    tx + trap.width/2, ty + trap.height/2, 0,
                    tx + trap.width/2, ty + trap.height/2, trap.width/2
                );
                trapGrad.addColorStop(0, '#ff6600');
                trapGrad.addColorStop(1, '#ff2200');
                ctx.fillStyle = trapGrad;
                ctx.beginPath();
                ctx.arc(tx + trap.width/2, ty + trap.height/2, trap.width/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#ffaa00';
                ctx.beginPath();
                ctx.arc(tx + trap.width/2, ty + trap.height/2, trap.width/3, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffff88';
                ctx.beginPath();
                ctx.arc(tx + trap.width/2, ty + trap.height/2, trap.width/6, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillStyle = 'rgba(80, 40, 40, 0.4)';
                ctx.beginPath();
                ctx.arc(tx + trap.width/2, ty + trap.height/2, trap.width/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(100, 50, 50, 0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        });

        this.projectiles.forEach(proj => {
            const px = proj.x - camera.x;
            const py = proj.y - camera.y;

            ctx.fillStyle = 'rgba(255, 0, 68, 0.2)';
            ctx.fillRect(px - proj.vx * 2, py - proj.vy * 2, proj.width, proj.height);

            ctx.shadowColor = '#ff0044';
            ctx.shadowBlur = 10;
            ctx.fillStyle = '#ff0044';
            ctx.beginPath();
            ctx.arc(px + proj.width/2, py + proj.height/2, proj.width/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ff88aa';
            ctx.beginPath();
            ctx.arc(px + proj.width/2 - 2, py + proj.height/2 - 2, proj.width/4, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        });

        const gx = this.goal.x - camera.x;
        const gy = this.goal.y - camera.y;

        const glowPulse = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 25 * glowPulse;
        ctx.fillStyle = `rgba(0, 255, 136, ${0.2 * glowPulse})`;
        ctx.fillRect(gx - 12, gy - 12, this.goal.width + 24, this.goal.height + 24);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#00aa66';
        ctx.fillRect(gx, gy, this.goal.width, this.goal.height);
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 3;
        ctx.strokeRect(gx, gy, this.goal.width, this.goal.height);

        const doorGrad = ctx.createLinearGradient(gx, gy, gx, gy + this.goal.height);
        doorGrad.addColorStop(0, '#004422');
        doorGrad.addColorStop(1, '#002211');
        ctx.fillStyle = doorGrad;
        ctx.fillRect(gx + 4, gy + 4, this.goal.width - 8, this.goal.height - 8);

        ctx.fillStyle = `rgba(0, 255, 136, ${0.1 * glowPulse})`;
        ctx.fillRect(gx + 6, gy + 6, this.goal.width - 12, this.goal.height - 12);

        ctx.fillStyle = '#00ff88';
        ctx.font = 'bold 11px "Press Start 2P", Courier New';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 5;
        ctx.fillText('EXIT', gx + this.goal.width/2, gy + this.goal.height/2 + 3);
        ctx.shadowBlur = 0;
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  INPUT HANDLER
// ═══════════════════════════════════════════════════════════════════════════════
const Input = {
    keys: {},
    prevKeys: {},

    init() {
        if (document.body) {
            document.body.tabIndex = 0;
            document.body.style.outline = 'none';
            document.body.focus();
        }

        const handleKeyDown = (e) => {
            this.keys[e.key] = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Enter', 'Escape', 'r', 'p', 'm'].includes(e.key)) {
                e.preventDefault();
            }
        };

        const handleKeyUp = (e) => {
            this.keys[e.key] = false;
        };

        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        document.addEventListener('keydown', handleKeyDown);
        document.addEventListener('keyup', handleKeyUp);

        document.addEventListener('click', () => {
            if (document.body) document.body.focus();
        });
    },

    justPressed(key) {
        return this.keys[key] && !this.prevKeys[key];
    },

    clear() {
        for (const key in this.keys) {
            this.keys[key] = false;
        }
        for (const key in this.prevKeys) {
            this.prevKeys[key] = false;
        }
    },

    update() {
        this.prevKeys = {...this.keys};
    }
};

// ═══════════════════════════════════════════════════════════════════════════════
//  INTRO SEQUENCE
// ═══════════════════════════════════════════════════════════════════════════════
class Intro {
    constructor() {
        this.phase = 0;
        this.timer = 0;
        this.alpha = 0;
        this.done = false;
        this.playedSound = false;
        this.scanlineY = 0;
    }

    update() {
        this.timer++;

        if (this.phase === 0) {
            if (!this.playedSound) {
                AudioSys.play('intro');
                this.playedSound = true;
            }
            this.alpha = Math.min(1, this.alpha + 0.015);
            if (this.timer > 200) {
                this.phase = 1;
                this.timer = 0;
                this.alpha = 0;
            }
        } else if (this.phase === 1) {
            this.alpha = Math.min(1, this.alpha + 0.015);
            if (this.timer > 200) {
                this.phase = 2;
                this.timer = 0;
            }
        } else if (this.phase === 2) {
            this.alpha -= 0.02;
            if (this.alpha <= 0) {
                this.done = true;
            }
        }

        if (Input.keys['Enter'] || Input.keys[' ']) {
            this.done = true;
        }
    }

    draw(ctx) {
        ctx.fillStyle = '#050508';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        this.scanlineY += 8;
        if (this.scanlineY > canvas.height) this.scanlineY = 0;
        ctx.fillStyle = 'rgba(233, 69, 96, 0.15)';
        ctx.fillRect(0, this.scanlineY, canvas.width, 4);
        ctx.fillStyle = 'rgba(233, 69, 96, 0.05)';
        ctx.fillRect(0, this.scanlineY - 20, canvas.width, 20);

        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        if (this.phase === 0) {
            const glitch = Math.random() > 0.92;
            const offsetX = glitch ? (Math.random() - 0.5) * 15 : 0;
            const rgbOffset = glitch ? 3 : 0;

            ctx.font = 'bold 80px "Press Start 2P", Courier New';
            ctx.fillStyle = '#ff0044';
            ctx.fillText('HAMADA', canvas.width/2 + offsetX + rgbOffset, canvas.height/2 - 40);
            ctx.fillStyle = '#00ffff';
            ctx.fillText('HAMADA', canvas.width/2 + offsetX - rgbOffset, canvas.height/2 - 40);
            ctx.fillStyle = '#e94560';
            ctx.fillText('HAMADA', canvas.width/2 + offsetX, canvas.height/2 - 40);

            if (glitch) {
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(canvas.width/2 - 200 + offsetX, canvas.height/2 - 60, 400, 3);
                ctx.fillRect(canvas.width/2 - 150 + offsetX, canvas.height/2 - 30, 300, 2);
            }

            ctx.font = '20px "VT323", Courier New';
            ctx.fillStyle = '#666';
            ctx.fillText('A Game by', canvas.width/2, canvas.height/2 + 30);
        } else if (this.phase === 1) {
            ctx.fillStyle = '#e94560';
            ctx.font = 'bold 56px "Press Start 2P", Courier New';
            ctx.fillText('WOLF STUDIO', canvas.width/2, canvas.height/2 - 20);

            ctx.font = '18px "VT323", Courier New';
            ctx.fillStyle = '#444';
            ctx.fillText('presents', canvas.width/2, canvas.height/2 + 30);

            const barWidth = 200;
            const progress = Math.min(1, this.timer / 180);
            ctx.fillStyle = '#222';
            ctx.fillRect(canvas.width/2 - barWidth/2, canvas.height/2 + 60, barWidth, 8);
            ctx.fillStyle = '#e94560';
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 10;
            ctx.fillRect(canvas.width/2 - barWidth/2, canvas.height/2 + 60, barWidth * progress, 8);
            ctx.shadowBlur = 0;

            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 1;
            ctx.strokeRect(canvas.width/2 - barWidth/2, canvas.height/2 + 60, barWidth, 8);
        }

        ctx.globalAlpha = 1;

        if (this.timer > 60) {
            ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(this.timer * 0.1) * 0.2})`;
            ctx.font = '14px "Press Start 2P", Courier New';
            ctx.fillText('Press ENTER to skip', canvas.width/2, canvas.height - 40);
        }
    }
}

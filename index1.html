class LevelSelect {
    constructor() {
        this.selected = 0;
        this.time = 0;
        this.bgStars = [];
        for (let i = 0; i < 80; i++) {
            this.bgStars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                twinkle: Math.random() * Math.PI * 2
            });
        }
    }

    update() {
        this.time += 0.02;

        if (Input.justPressed('ArrowLeft') || Input.justPressed('a')) {
            this.selected = Math.max(0, this.selected - 1);
            AudioSys.play('click');
        }
        if (Input.justPressed('ArrowRight') || Input.justPressed('d')) {
            this.selected = Math.min(9, this.selected + 1);
            AudioSys.play('click');
        }
        if (Input.justPressed('ArrowUp') || Input.justPressed('w')) {
            this.selected = Math.max(0, this.selected - 5);
            AudioSys.play('click');
        }
        if (Input.justPressed('ArrowDown') || Input.justPressed('s')) {
            this.selected = Math.min(9, this.selected + 5);
            AudioSys.play('click');
        }
        if (Input.justPressed('Enter') || Input.justPressed(' ')) {
            if (SaveSystem.isLevelUnlocked(this.selected)) {
                Game.loadLevel(this.selected);
                Game.state = STATES.PLAYING;
                AudioSys.play('click');
                AudioSys.stopBGM();
            }
        }
        if (Input.justPressed('Escape')) {
            Game.state = STATES.MAIN_MENU;
            AudioSys.startBGM();
        }
    }

    draw(ctx) {
        const bgGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 100, canvas.width/2, canvas.height/2, 600);
        bgGrad.addColorStop(0, '#0a0a1a');
        bgGrad.addColorStop(1, '#050508');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        this.bgStars.forEach(star => {
            const twinkle = Math.sin(this.time + star.twinkle) * 0.5 + 0.5;
            ctx.fillStyle = `rgba(255, 255, 255, ${twinkle * 0.6})`;
            ctx.fillRect(star.x, star.y, star.size, star.size);
        });

        const progress = SaveSystem.getProgress();

        ctx.shadowColor = '#e94560';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#e94560';
        ctx.font = 'bold 36px "Press Start 2P", Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('SELECT LEVEL', canvas.width/2, 60);
        ctx.shadowBlur = 0;

        ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
        ctx.fillRect(canvas.width/2 - 120, 70, 240, 2);

        const cols = 5;
        const startX = 130;
        const startY = 110;
        const gapX = 150;
        const gapY = 140;

        for (let i = 0; i < 10; i++) {
            const col = i % cols;
            const row = Math.floor(i / cols);
            const x = startX + col * gapX;
            const y = startY + row * gapY;
            const unlocked = SaveSystem.isLevelUnlocked(i);
            const completed = progress.completed.includes(i);
            const isSelected = i === this.selected;

            if (isSelected) {
                ctx.shadowColor = unlocked ? '#e94560' : '#444';
                ctx.shadowBlur = 20;
            }

            const boxGrad = ctx.createLinearGradient(x, y, x, y + 100);
            if (completed) {
                boxGrad.addColorStop(0, '#1a4a2e');
                boxGrad.addColorStop(1, '#0f2a1a');
            } else if (unlocked) {
                boxGrad.addColorStop(0, '#1a1a4e');
                boxGrad.addColorStop(1, '#0f0f2e');
            } else {
                boxGrad.addColorStop(0, '#0a0a1a');
                boxGrad.addColorStop(1, '#05050a');
            }
            ctx.fillStyle = boxGrad;
            ctx.fillRect(x, y, 100, 100);

            ctx.strokeStyle = isSelected ? '#e94560' : (unlocked ? '#333' : '#1a1a1a');
            ctx.lineWidth = isSelected ? 3 : 2;
            ctx.strokeRect(x, y, 100, 100);
            ctx.shadowBlur = 0;

            if (isSelected) {
                ctx.strokeStyle = 'rgba(233, 69, 96, 0.3)';
                ctx.lineWidth = 1;
                ctx.strokeRect(x + 3, y + 3, 94, 94);
            }

            ctx.fillStyle = unlocked ? '#fff' : '#333';
            ctx.font = 'bold 24px "Press Start 2P", Courier New';
            ctx.textAlign = 'center';
            ctx.fillText((i + 1).toString(), x + 50, y + 45);

            if (!unlocked) {
                ctx.fillStyle = '#333';
                ctx.font = '16px "Press Start 2P", Courier New';
                ctx.fillText('X', x + 50, y + 75);
            } else if (completed) {
                ctx.fillStyle = '#00ff88';
                ctx.font = 'bold 14px "Press Start 2P", Courier New';
                ctx.fillText('OK', x + 50, y + 75);
            }

            if (i === 9) {
                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 10px "Press Start 2P", Courier New';
                ctx.fillText('HELL', x + 50, y + 92);
            }
        }

        const unlocked = SaveSystem.isLevelUnlocked(this.selected);
        ctx.fillStyle = unlocked ? '#aaa' : '#444';
        ctx.font = '16px "VT323", Courier New';
        ctx.textAlign = 'center';

        const names = [
            'The Beginning', 'Spike Valley', 'Moving Madness', 'Vertical Nightmare',
            'The Drop', 'Trap Factory', 'Speed Demon', 'The Gauntlet',
            'Precision Hell', 'HELL'
        ];

        ctx.fillText(names[this.selected], canvas.width/2, 430);

        if (!unlocked) {
            ctx.fillStyle = '#e94560';
            ctx.fillText('Complete previous level to unlock!', canvas.width/2, 460);
        } else {
            ctx.fillStyle = '#00ff88';
            ctx.fillText('Press ENTER to play', canvas.width/2, 460);
        }

        ctx.fillStyle = '#555';
        ctx.font = '14px "VT323", Courier New';
        ctx.fillText(`Total Deaths: ${Game.deathCount}`, canvas.width/2, 500);

        ctx.fillStyle = '#333';
        ctx.font = '12px "Press Start 2P", Courier New';
        ctx.fillText('ESC: Back | Arrows: Navigate | ENTER: Select', canvas.width/2, 530);
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  GAME OVER SCREEN
// ═══════════════════════════════════════════════════════════════════════════════
class GameOverScreen {
    constructor() {
        this.timer = 0;
        this.particles = [];
    }
    update() {
        this.timer++;

        if (this.timer % 3 === 0) {
            this.particles.push({
                x: Math.random() * canvas.width,
                y: -10,
                vx: (Math.random() - 0.5) * 3,
                vy: Math.random() * 4 + 2,
                size: 3 + Math.random() * 5,
                life: 1.0,
                decay: 0.01 + Math.random() * 0.02
            });
        }

        this.particles = this.particles.filter(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.15;
            p.life -= p.decay;
            return p.life > 0 && p.y < canvas.height + 20;
        });

        if (Input.justPressed('r') || Input.justPressed('Enter')) {
            Game.respawn();
        }
        if (Input.justPressed('Escape')) {
            Game.state = STATES.LEVEL_SELECT;
            AudioSys.startBGM();
        }
    }
    draw(ctx) {
        const overlayGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, 500);
        overlayGrad.addColorStop(0, 'rgba(30, 0, 0, 0.9)');
        overlayGrad.addColorStop(1, 'rgba(10, 0, 0, 0.95)');
        ctx.fillStyle = overlayGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        this.particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = '#e94560';
            ctx.fillRect(p.x, p.y, p.size, p.size);
        });
        ctx.globalAlpha = 1;

        const glitch = Math.random() > 0.95;
        const offset = glitch ? (Math.random() - 0.5) * 6 : 0;

        ctx.shadowColor = '#e94560';
        ctx.shadowBlur = 25;
        ctx.fillStyle = '#e94560';
        ctx.font = 'bold 48px "Press Start 2P", Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('YOU DIED', canvas.width/2 + offset, 180);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#fff';
        ctx.font = '22px "VT323", Courier New';
        ctx.fillText(`Level ${Game.currentLevel + 1}`, canvas.width/2, 260);
        ctx.fillText(`Deaths: ${Game.deathCount}`, canvas.width/2, 300);

        const flash = Math.sin(this.timer * 0.08) > 0;
        ctx.fillStyle = flash ? '#e94560' : '#666';
        ctx.font = '18px "Press Start 2P", Courier New';
        ctx.fillText('Press R or ENTER to retry', canvas.width/2, 380);
        ctx.fillText('Press ESC for level select', canvas.width/2, 420);
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  LEVEL COMPLETE SCREEN
// ═══════════════════════════════════════════════════════════════════════════════
class LevelCompleteScreen {
    constructor() {
        this.timer = 0;
        this.confetti = [];
        this.stars = [];
        for (let i = 0; i < 50; i++) {
            this.stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                twinkle: Math.random() * Math.PI * 2
            });
        }
    }
    update() {
        this.timer++;

        if (this.timer % 4 === 0) {
            this.confetti.push({
                x: Math.random() * canvas.width,
                y: -10,
                vx: (Math.random() - 0.5) * 5,
                vy: Math.random() * 3 + 2,
                color: ['#e94560', '#00ff88', '#ffd700', '#ff6b6b', '#00aaff', '#ff44ff'][Math.floor(Math.random() * 6)],
                size: 4 + Math.random() * 6,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.2
            });
        }

        this.confetti = this.confetti.filter(c => {
            c.x += c.vx;
            c.y += c.vy;
            c.vy += 0.1;
            c.rotation += c.rotSpeed;
            return c.y < canvas.height + 20;
        });

        if (Input.justPressed('Enter') || Input.justPressed(' ')) {
            Game.nextLevel();
        }
    }
    draw(ctx) {
        const bgGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 100, canvas.width/2, canvas.height/2, 500);
        bgGrad.addColorStop(0, 'rgba(0, 30, 10, 0.8)');
        bgGrad.addColorStop(1, 'rgba(0, 10, 5, 0.9)');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        this.stars.forEach(star => {
            const twinkle = Math.sin(this.timer * 0.05 + star.twinkle) * 0.5 + 0.5;
            ctx.fillStyle = `rgba(255, 255, 255, ${twinkle * 0.5})`;
            ctx.fillRect(star.x, star.y, star.size, star.size);
        });

        this.confetti.forEach(c => {
            ctx.save();
            ctx.translate(c.x, c.y);
            ctx.rotate(c.rotation);
            ctx.fillStyle = c.color;
            ctx.fillRect(-c.size/2, -c.size/2, c.size, c.size);
            ctx.restore();
        });

        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 25;
        ctx.fillStyle = '#00ff88';
        ctx.font = 'bold 40px "Press Start 2P", Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('LEVEL COMPLETE!', canvas.width/2, 180);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#fff';
        ctx.font = '24px "VT323", Courier New';
        ctx.fillText(`Level ${Game.currentLevel + 1} Cleared!`, canvas.width/2, 250);

        ctx.fillStyle = '#e94560';
        ctx.font = '20px "VT323", Courier New';
        ctx.fillText(`Total Deaths: ${Game.deathCount}`, canvas.width/2, 300);

        const flash = Math.sin(this.timer * 0.08) > 0;
        ctx.fillStyle = flash ? '#00ff88' : '#fff';
        ctx.font = '18px "Press Start 2P", Courier New';
        ctx.fillText('Press ENTER to continue', canvas.width/2, 380);
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  END SCREEN
// ═══════════════════════════════════════════════════════════════════════════════
class EndScreen {
    constructor() {
        this.timer = 0;
        this.particles = [];
    }
    update() {
        this.timer++;
        if (Input.justPressed('Enter') || Input.justPressed(' ')) {
            Game.state = STATES.MAIN_MENU;
            Game.currentLevel = 0;
            Game.deathCount = 0;
            AudioSys.startBGM();
        }

        if (this.timer % 5 === 0) {
            Game.particles.emit(
                Math.random() * canvas.width,
                Math.random() * canvas.height,
                ['#e94560', '#00ff88', '#ffd700', '#ff6b6b', '#00aaff'][Math.floor(Math.random() * 5)],
                8
            );
        }
    }
    draw(ctx) {
        const bgGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 100, canvas.width/2, canvas.height/2, 500);
        bgGrad.addColorStop(0, 'rgba(30, 20, 0, 0.9)');
        bgGrad.addColorStop(1, 'rgba(10, 5, 0, 0.95)');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        Game.particles.update();
        Game.particles.draw(ctx, {x: 0, y: 0});

        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 30;
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 40px "Press Start 2P", Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('CONGRATULATIONS!', canvas.width/2, 120);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#e94560';
        ctx.font = 'bold 32px "Press Start 2P", Courier New';
        ctx.fillText('YOU ARE HAMADA!', canvas.width/2, 190);

        ctx.fillStyle = '#fff';
        ctx.font = '22px "VT323", Courier New';
        ctx.fillText(`Total Deaths: ${Game.deathCount}`, canvas.width/2, 270);

        const rank = Game.deathCount < 20 ? 'LEGEND' : 
                     Game.deathCount < 50 ? 'MASTER' : 
                     Game.deathCount < 100 ? 'EXPERT' : 'SURVIVOR';

        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 28px "Press Start 2P", Courier New';
        ctx.fillText(`RANK: ${rank}`, canvas.width/2, 320);

        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 15;
        ctx.fillText(`RANK: ${rank}`, canvas.width/2, 320);
        ctx.shadowBlur = 0;

        const flash = Math.sin(this.timer * 0.08) > 0;
        ctx.fillStyle = flash ? '#ffd700' : '#fff';
        ctx.font = '16px "Press Start 2P", Courier New';
        ctx.fillText('Press ENTER to return to menu', canvas.width/2, 400);
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  PAUSE SCREEN
// ═══════════════════════════════════════════════════════════════════════════════
class PauseScreen {
    update() {
        if (Input.justPressed('Escape') || Input.justPressed('p')) {
            Game.state = STATES.PLAYING;
            Input.clear();
            return;
        }
        if (Input.justPressed('r')) {
            Game.respawn();
            Input.clear();
            return;
        }
        if (Input.justPressed('m')) {
            Game.state = STATES.LEVEL_SELECT;
            Input.clear();
            AudioSys.startBGM();
            return;
        }
    }
    draw(ctx) {
        const overlayGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 100, canvas.width/2, canvas.height/2, 500);
        overlayGrad.addColorStop(0, 'rgba(0, 0, 0, 0.7)');
        overlayGrad.addColorStop(1, 'rgba(0, 0, 0, 0.85)');
        ctx.fillStyle = overlayGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.shadowColor = '#e94560';
        ctx.shadowBlur = 25;
        ctx.fillStyle = '#e94560';
        ctx.font = 'bold 48px "Press Start 2P", Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', canvas.width/2, 180);
        ctx.shadowBlur = 0;

        ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
        ctx.fillRect(canvas.width/2 - 60, 200, 20, 40);
        ctx.fillRect(canvas.width/2 + 40, 200, 20, 40);

        ctx.fillStyle = '#fff';
        ctx.font = '20px "VT323", Courier New';
        ctx.fillText('ESC / P: Resume', canvas.width/2, 300);
        ctx.fillText('R: Restart Level', canvas.width/2, 340);
        ctx.fillText('M: Level Select', canvas.width/2, 380);

        ctx.fillStyle = '#666';
        ctx.font = '16px "VT323", Courier New';
        ctx.fillText(`Level ${Game.currentLevel + 1} | Deaths: ${Game.deathCount}`, canvas.width/2, 440);
    }
}


// ═══════════════════════════════════════════════════════════════════════════════
//  MAIN GAME ENGINE
// ═══════════════════════════════════════════════════════════════════════════════
const Game = {
    state: STATES.INTRO,
    currentLevel: 0,
    deathCount: 0,
    player: null,
    level: null,
    camera: null,
    particles: null,
    intro: null,
    mainMenu: null,
    levelSelect: null,
    gameOver: null,
    levelComplete: null,
    endScreen: null,
    pauseScreen: null,
    afkTimer: 0,
    afkWarned: false,
    lastInputTime: 0,
    levelCompleteTriggered: false,

    async init() {
        Input.init();
        AudioSys.init();
        VolumeControl.init();

        this.particles = new ParticleSystem();
        this.camera = new Camera();
        this.intro = new Intro();
        this.mainMenu = new MainMenu();
        this.levelSelect = new LevelSelect();
        this.gameOver = new GameOverScreen();
        this.levelComplete = new LevelCompleteScreen();
        this.endScreen = new EndScreen();
        this.pauseScreen = new PauseScreen();

        this.lastInputTime = Date.now();
        this.loop();
    },

    loadLevel(index) {
        this.currentLevel = index;
        const data = LEVELS[index];
        this.level = new Level(data, index);
        this.player = new Player(data.playerStart.x, data.playerStart.y);
        this.camera.x = 0;
        this.camera.y = 0;
        this.particles = new ParticleSystem();
        this.afkTimer = 0;
        this.afkWarned = false;
        this.levelCompleteTriggered = false;
        AudioSys.stopBGM();
    },

    respawn() {
        const data = LEVELS[this.currentLevel];
        this.player.reset(data.playerStart.x, data.playerStart.y);
        this.state = STATES.PLAYING;
        this.particles = new ParticleSystem();
        ScreenShake.intensity = 0;
        this.levelCompleteTriggered = false;
    },

    triggerLevelComplete() {
        if (this.levelCompleteTriggered) return;
        this.levelCompleteTriggered = true;

        AudioSys.play('levelComplete');
        this.particles.emit(this.player.x, this.player.y, '#00ff88', 40, 8);
        this.particles.emit(this.player.x, this.player.y, '#ffd700', 20, 5);

        SaveSystem.completeLevel(this.currentLevel, this.deathCount);

        this.state = STATES.LEVEL_COMPLETE;
        this.levelComplete.timer = 0;
        this.levelComplete.confetti = [];
    },

    nextLevel() {
        this.currentLevel++;
        if (this.currentLevel >= LEVELS.length) {
            this.state = STATES.END_SCREEN;
            this.endScreen.timer = 0;
            AudioSys.startBGM();
        } else {
            this.loadLevel(this.currentLevel);
            this.state = STATES.PLAYING;
        }
    },

    update() {
        ScreenShake.update();

        const hasInput = Object.values(Input.keys).some(v => v);
        if (hasInput) {
            this.lastInputTime = Date.now();
            this.afkTimer = 0;
            this.afkWarned = false;
        } else {
            this.afkTimer++;
        }

        if (this.state === STATES.PLAYING && this.afkTimer > 240 && !this.afkWarned) {
            this.afkWarned = true;
            AudioSys.play('afk');
        }

        switch (this.state) {
            case STATES.INTRO:
                this.intro.update();
                if (this.intro.done) {
                    this.state = STATES.MAIN_MENU;
                    AudioSys.startBGM();
                }
                break;

            case STATES.MAIN_MENU:
                this.mainMenu.update();
                break;

            case STATES.LEVEL_SELECT:
                this.levelSelect.update();
                break;

            case STATES.PLAYING:
                if (Input.justPressed('Escape') || Input.justPressed('p')) {
                    this.state = STATES.PAUSED;
                    Input.clear();
                    break;
                }
                this.player.update(Input, this.level);
                this.level.update();
                this.camera.follow(this.player, this.level.width, this.level.height);
                this.particles.update();

                if (this.player.dead) {
                    this.state = STATES.GAME_OVER;
                    this.gameOver.timer = 0;
                    this.gameOver.particles = [];
                }
                break;

            case STATES.PAUSED:
                this.pauseScreen.update();
                break;

            case STATES.GAME_OVER:
                this.gameOver.update();
                break;

            case STATES.LEVEL_COMPLETE:
                this.levelComplete.update();
                break;

            case STATES.END_SCREEN:
                this.endScreen.update();
                break;
        }

        Input.update();
    },

    draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        switch (this.state) {
            case STATES.INTRO:
                this.intro.draw(ctx);
                break;

            case STATES.MAIN_MENU:
                this.mainMenu.draw(ctx);
                break;

            case STATES.LEVEL_SELECT:
                this.levelSelect.draw(ctx);
                break;

            case STATES.PLAYING:
                this.level.draw(ctx, this.camera);
                this.player.draw(ctx, this.camera);
                this.particles.draw(ctx, this.camera);
                this.drawHUD(ctx);
                break;

            case STATES.PAUSED:
                this.level.draw(ctx, this.camera);
                this.player.draw(ctx, this.camera);
                this.particles.draw(ctx, this.camera);
                this.pauseScreen.draw(ctx);
                break;

            case STATES.GAME_OVER:
                this.level.draw(ctx, this.camera);
                this.particles.draw(ctx, this.camera);
                this.gameOver.draw(ctx);
                break;

            case STATES.LEVEL_COMPLETE:
                this.level.draw(ctx, this.camera);
                this.particles.draw(ctx, this.camera);
                this.levelComplete.draw(ctx);
                break;

            case STATES.END_SCREEN:
                this.endScreen.draw(ctx);
                break;
        }

        CRT.draw();
    },

    drawHUD(ctx) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(10, 10, 200, 85);
        ctx.strokeStyle = '#e94560';
        ctx.lineWidth = 2;
        ctx.strokeRect(10, 10, 200, 85);

        ctx.strokeStyle = 'rgba(233, 69, 96, 0.2)';
        ctx.lineWidth = 1;
        ctx.strokeRect(14, 14, 192, 77);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px "Press Start 2P", Courier New';
        ctx.textAlign = 'left';
        ctx.fillText(`LVL ${this.currentLevel + 1}/10`, 22, 35);

        ctx.fillStyle = '#e94560';
        ctx.fillText(`DEATHS ${this.deathCount}`, 22, 58);

        ctx.fillStyle = '#666';
        ctx.font = '10px "Press Start 2P", Courier New';
        ctx.fillText(`AFK ${Math.max(0, 4 - Math.floor(this.afkTimer/60))}s`, 22, 80);

        if (this.afkTimer > 180 && this.afkTimer < 240) {
            const alpha = (this.afkTimer - 180) / 60;
            ctx.fillStyle = `rgba(255, 68, 0, ${alpha})`;
            ctx.textAlign = 'center';
            ctx.font = 'bold 16px "Press Start 2P", Courier New';
            ctx.shadowColor = '#ff4400';
            ctx.shadowBlur = 10;
            ctx.fillText('MOVE OR DIE!', canvas.width/2, 100);
            ctx.shadowBlur = 0;
        }

        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = '10px "Press Start 2P", Courier New';
        ctx.textAlign = 'right';
        ctx.fillText('ESC: Pause', canvas.width - 20, 30);
    },

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
};

// ═══════════════════════════════════════════════════════════════════════════════
//  START THE GAME
// ═══════════════════════════════════════════════════════════════════════════════
window.onload = () => Game.init();
</script>
